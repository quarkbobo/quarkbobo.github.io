<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中国象棋联机版</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="rotateHint" class="rotate-hint">手机横屏体验更佳</div>
    <main class="layout">
      <section class="board-panel">
        <div id="board" class="board"></div>
      </section>
      <section class="side-panel">
        <h1>中国象棋联机版</h1>
        <div class="room-box">
          <input id="serverUrlInput" placeholder="后端地址，如 https://xxx.onrender.com" />
          <button id="saveServerBtn">保存后端地址</button>
          <input id="roomIdInput" placeholder="输入房间号" />
          <button id="createRoomBtn">创建房间</button>
          <button id="joinRoomBtn">加入房间</button>
          <button id="watchRoomBtn">观战加入</button>
        </div>
        <p class="meta">可手填后端地址，也可在同目录的 <code>config.js</code> 固定配置后端。</p>
        <p id="roomText" class="meta">未加入房间</p>
        <p id="roleText" class="meta">身份：-</p>
        <p id="timerText" class="meta">红方 30:00 | 黑方 30:00</p>
        <p id="status" class="status">请先填写后端地址并创建/加入房间</p>
        <div class="buttons">
          <button id="resetBtn">重新开局</button>
          <button id="flipBtn">翻转棋盘</button>
          <button id="undoBtn">请求悔棋</button>
          <button id="undoAcceptBtn">同意悔棋</button>
          <button id="undoRejectBtn">拒绝悔棋</button>
        </div>
      </section>
    </main>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="./config.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
